<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Snake - Perfect AI Mode</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

canvas {
  transition: transform 0.05s linear;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc;
}

#score {
  font-size: 26px;
  font-weight: bold;
}

#alerts {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 22px;
}
</style>

</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="score">Score: 0</div>
</div>

<div id="alerts"></div>

<script>
// ================= CANVAS =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 600;
canvas.height = 600;

// ================= GRID =================
const GRID = 10;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

// ================= STATE =================
let snake = [{x:300,y:300}];
let foods = [];
let score = 0;
let speed = 60;

// ================= HAMILTONIAN CYCLE =================
let path = [];

function buildCycle(){
  let p = [];

  for(let y=0;y<ROWS;y++){
    if(y % 2 === 0){
      for(let x=0;x<COLS;x++){
        p.push({x:x*GRID,y:y*GRID});
      }
    } else {
      for(let x=COLS-1;x>=0;x--){
        p.push({x:x*GRID,y:y*GRID});
      }
    }
  }

  return p;
}

path = buildCycle();

// ================= FOOD =================
function spawnFood(){
  foods.push({
    x: Math.floor(Math.random()*COLS)*GRID,
    y: Math.floor(Math.random()*ROWS)*GRID
  });
}

// keep food alive
setInterval(()=> {
  if(foods.length < 3) spawnFood();
}, 800);

// ================= PERFECT AI =================
function getNextMove(){
  let head = snake[0];

  let i = path.findIndex(p => p.x === head.x && p.y === head.y);

  let next = path[(i + 1) % path.length];

  return {
    dx: next.x - head.x,
    dy: next.y - head.y
  };
}

// ================= GAME LOOP =================
function update(){
  let move = getNextMove();

  let head = {
    x: snake[0].x + move.dx,
    y: snake[0].y + move.dy
  };

  snake.unshift(head);

  let ate = false;

  foods = foods.filter(f => {
    if(f.x === head.x && f.y === head.y){
      ate = true;
      score += 10;
      return false;
    }
    return true;
  });

  if(!ate) snake.pop();

  document.getElementById("score").innerText = "Score: " + score;
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,600,600);

  // snake neon
  snake.forEach((s,i)=>{
    let hue = (i*10 + performance.now()*0.05) % 360;
    ctx.fillStyle = `hsl(${hue},100%,60%)`;
    ctx.fillRect(s.x,s.y,10,10);
  });

  // food
  foods.forEach(f=>{
    ctx.fillStyle = "red";
    ctx.fillRect(f.x,f.y,10,10);
  });
}

// ================= LOOP =================
function loop(){
  update();
  draw();
  setTimeout(loop,speed);
}

loop();
</script>

</body>
</html>
