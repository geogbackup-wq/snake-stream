<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake AI - Lookahead + Auto Restart</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

canvas {
  transition: transform 0.05s linear;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc;
}

#score {
  font-size: 24px;
}

#gameOver {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-size:28px;
}

#countdown {
  margin-top: 10px;
  font-size: 20px;
  color: #00ffcc;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="score">Score: 0</div>
</div>

<div id="gameOver">
  <div>💀 GAME OVER</div>
  <div id="countdown"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 600;
canvas.height = 600;

const GRID = 10;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

// ================= STATE =================
let snake, foods, score, grow, gameRunning;

let path = [];

// build Hamiltonian cycle
for(let y=0;y<ROWS;y++){
  if(y%2===0){
    for(let x=0;x<COLS;x++){
      path.push({x:x*GRID,y:y*GRID});
    }
  } else {
    for(let x=COLS-1;x>=0;x--){
      path.push({x:x*GRID,y:y*GRID});
    }
  }
}

// ================= INIT =================
function reset(){
  snake=[{x:300,y:300}];
  foods=[];
  score=0;
  grow=0;
  gameRunning=true;
  document.getElementById("gameOver").style.display="none";
}
reset();

// ================= SAFE FOOD =================
function spawnFood(){
  let pos;
  let safe=false;

  while(!safe){
    pos = path[Math.floor(Math.random()*path.length)];
    safe = !snake.some(s=>s.x===pos.x && s.y===pos.y);
  }

  foods.push({x:pos.x,y:pos.y});
}

// ================= LOOKAHEAD AI =================
function clone(s){return s.map(p=>({...p}));}

function simulate(snakeSim, move){
  let h = snakeSim[0];

  let nh = {x:h.x+move.dx,y:h.y+move.dy};

  for(let i=1;i<snakeSim.length;i++){
    if(snakeSim[i].x===nh.x && snakeSim[i].y===nh.y){
      return null;
    }
  }

  snakeSim.unshift(nh);

  let ate=false;
  for(let f of foods){
    if(f.x===nh.x && f.y===nh.y){
      ate=true;
      break;
    }
  }

  if(!ate) snakeSim.pop();

  return snakeSim;
}

function moves(){
  return [
    {dx:10,dy:0},
    {dx:-10,dy:0},
    {dx:0,dy:10},
    {dx:0,dy:-10}
  ];
}

function evaluate(s){
  if(!s) return -999999;
  return s.length;
}

function getMove(){
  let best=-999999;
  let bestMove={dx:10,dy:0};

  for(let m of moves()){
    let sim=clone(snake);

    let ok=true;

    for(let i=0;i<10;i++){
      sim=simulate(sim,m);
      if(!sim){ok=false;break;}
    }

    let score=evaluate(ok?sim:null);

    if(score>best){
      best=score;
      bestMove=m;
    }
  }

  return bestMove;
}

// ================= UPDATE =================
function update(){
  if(!gameRunning) return;

  if(foods.length<3) spawnFood();

  let m=getMove();

  let head={
    x:snake[0].x+m.dx,
    y:snake[0].y+m.dy
  };

  // 💀 COLLISION
  if(snake.some(s=>s.x===head.x && s.y===head.y)){
    gameOver();
    return;
  }

  snake.unshift(head);

  let ate=false;

  foods=foods.filter(f=>{
    if(f.x===head.x && f.y===head.y){
      ate=true;
      score+=10;
      grow++;
      return false;
    }
    return true;
  });

  if(grow>0){
    grow--;
  } else {
    snake.pop();
  }

  document.getElementById("score").innerText="Score: "+score;
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,600,600);

  snake.forEach((s,i)=>{
    ctx.fillStyle=`hsl(${i*10},100%,60%)`;
    ctx.fillRect(s.x,s.y,10,10);
  });

  foods.forEach(f=>{
    ctx.fillStyle="red";
    ctx.fillRect(f.x,f.y,10,10);
  });
}

// ================= GAME OVER =================
function gameOver(){
  gameRunning=false;
  document.getElementById("gameOver").style.display="flex";

  let t=5;
  document.getElementById("countdown").innerText="Restarting in "+t;

  let interval=setInterval(()=>{
    t--;
    document.getElementById("countdown").innerText="Restarting in "+t;

    if(t<=0){
      clearInterval(interval);
      restart();
    }
  },1000);
}

// ================= RESTART =================
function restart(){
  reset();
}

// ================= LOOP =================
function loop(){
  update();
  draw();
  setTimeout(loop,60);
}

loop();
</script>

</body>
</html>
