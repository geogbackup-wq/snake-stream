<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Snake Arcade AI (Growth + Perfect Mode)</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

canvas {
  transition: transform 0.05s linear;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc;
}

#score {
  font-size: 26px;
  font-weight: bold;
}
</style>

</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="score">Score: 0</div>
</div>

<script>
// ================= CANVAS =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 600;
canvas.height = 600;

// ================= GRID =================
const GRID = 10;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

// ================= STATE =================
let snake = [{x:300,y:300}];
let foods = [];
let score = 0;
let grow = 0;
let speed = 60;

// ================= HAMILTONIAN PATH =================
let path = [];
for(let y=0;y<ROWS;y++){
  if(y%2===0){
    for(let x=0;x<COLS;x++){
      path.push({x:x*GRID,y:y*GRID});
    }
  } else {
    for(let x=COLS-1;x>=0;x--){
      path.push({x:x*GRID,y:y*GRID});
    }
  }
}

// ================= FOOD SYSTEM =================
let foodTimer = 0;
let foodMode = "normal";

function spawnFood(){
  let p = path[Math.floor(Math.random()*path.length)];

  let type = "normal";
  if(foodMode === "burst") type = "gold";
  else if(Math.random() < 0.1) type = "gold";

  foods.push({
    x:p.x,
    y:p.y,
    pulse:0,
    type
  });
}

// spawn loop
function foodSystem(){
  foodTimer++;

  let interval = Math.max(10, 25 - Math.floor(score/50));

  if(foodTimer > 500){
    foodMode = "burst";
    for(let i=0;i<6;i++) spawnFood();
    setTimeout(()=>foodMode="normal",2000);
    foodTimer = 0;
  }

  if(foodTimer % interval === 0){
    spawnFood();
  }
}

// ================= PERFECT AI =================
function getMove(){
  let head = snake[0];
  let i = path.findIndex(p=>p.x===head.x && p.y===head.y);
  let next = path[(i+1)%path.length];

  return {
    dx:next.x-head.x,
    dy:next.y-head.y
  };
}

// ================= UPDATE =================
function update(){
  foodSystem();

  let m = getMove();

  let head = {
    x: snake[0].x + m.dx,
    y: snake[0].y + m.dy
  };

  snake.unshift(head);

  let ate = false;

  foods = foods.filter(f=>{
    if(f.x === head.x && f.y === head.y){
      ate = true;

      score += f.type==="gold" ? 50 : 10;

      grow++; // 🐍 GROWTH SYSTEM

      return false;
    }
    return true;
  });

  // 🐍 IMPORTANT: growth logic
  if(grow > 0){
    grow--; // keep tail = grow
  } else {
    snake.pop(); // normal movement
  }

  document.getElementById("score").innerText = "Score: " + score;
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,600,600);

  // snake (gradient growth feel)
  snake.forEach((s,i)=>{
    let hue = (i*10 + performance.now()*0.05)%360;
    ctx.fillStyle = `hsl(${hue},100%,60%)`;
    ctx.fillRect(s.x,s.y,10,10);
  });

  // food
  foods.forEach(f=>{
    f.pulse += 0.1;

    let size = 10 + Math.sin(f.pulse)*2;

    ctx.fillStyle = f.type==="gold" ? "gold" : "red";
    ctx.fillRect(f.x,f.y,size,size);
  });
}

// ================= LOOP =================
function loop(){
  update();
  draw();
  setTimeout(loop,speed);
}

loop();
</script>

</body>
</html>
